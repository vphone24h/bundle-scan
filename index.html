<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- App Info -->
    <title>vkho.vn - Phần mềm quản lý kho miễn phí</title>
    <meta name="description" content="Phần mềm quản lý kho chuyên nghiệp cho iPhone/phụ kiện. Miễn phí trải nghiệm ngay!" />
    <meta name="author" content="vkho.vn" />
    
    <!-- PWA / Mobile App Meta Tags -->
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Preconnect to critical origins for faster loading -->
    <link rel="preconnect" href="https://rodpbhesrwykmpywiiyd.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://rodpbhesrwykmpywiiyd.supabase.co" />
    
    <!-- Icons - added dynamically by script below for store pages -->
    <link rel="icon" type="image/png" href="/favicon.png" id="static-favicon" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png" id="static-icon-32" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png" id="static-icon-16" />

    <!-- Dynamically set store icon + title for PWA on store pages -->
    <script>
      (function(){
        var p = location.pathname;
        var isStore = p.indexOf('/store/') === 0;
        var h = location.hostname;
        var isSubdomain = h !== 'bundle-scan.lovable.app' && h !== 'localhost' && h !== 'vkho.vn' && h !== 'www.vkho.vn' && !h.endsWith('.lovable.app') && !h.endsWith('.lovableproject.com');
        
        if (!isStore && !isSubdomain) {
          // Main domain: add static manifest + apple-touch-icon
          var sl = document.createElement('link');
          sl.rel = 'manifest'; sl.href = '/manifest.json';
          document.head.appendChild(sl);
          var ai = document.createElement('link');
          ai.rel = 'apple-touch-icon'; ai.setAttribute('sizes','180x180'); ai.href = '/icons/apple-touch-icon.png';
          document.head.appendChild(ai);
          var tm = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (tm) tm.setAttribute('content', 'vkho.vn');
          return;
        }

        // Store page or custom domain
        var supaUrl = 'https://rodpbhesrwykmpywiiyd.supabase.co';
        var anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvZHBiaGVzcnd5a21weXdpaXlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0MjM4MDMsImV4cCI6MjA4NDk5OTgwM30.P7Kc0pxkUdyHi8AgDBlRmPqxg0MWr2C_J_EUqORQY_s';
        var hdrs = { 'apikey': anonKey, 'Authorization': 'Bearer ' + anonKey, 'Content-Type': 'application/json' };
        var storeId = isStore ? p.split('/')[2] : (h.endsWith('.vkho.vn') ? h.replace('.vkho.vn','') : h);
        var titleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');

        function setIcon(url) {
          if (!url) return;
          var a = document.getElementById('static-apple-icon');
          if (a) a.href = url;
          var f = document.getElementById('static-favicon');
          if (f) f.href = url;
          document.querySelectorAll('link[rel="apple-touch-icon"]').forEach(function(el){ el.href = url; });
          var noSize = document.createElement('link');
          noSize.rel = 'apple-touch-icon'; noSize.href = url;
          document.head.appendChild(noSize);
        }
        function setTitle(name) {
          if (!name) return;
          document.title = name;
          if (titleMeta) titleMeta.setAttribute('content', name);
        }
        function createManifest(name, iconUrl) {
          if (!name) return;
          var sn = name.length > 12 ? (name.split(/\s+/).pop() || name).slice(0,12) : name;
          var ic = iconUrl || '/icons/icon-192x192.png';
          var ic512 = iconUrl || '/icons/icon-512x512.png';
          var mf = {
            name: name, short_name: sn, description: name,
            start_url: location.href, display: 'standalone',
            orientation: 'portrait', background_color: '#f8fafc', theme_color: '#1e3a5f',
            icons: [
              { src: ic, sizes: '192x192', type: 'image/png', purpose: 'any' },
              { src: ic, sizes: '180x180', type: 'image/png', purpose: 'any' },
              { src: ic512, sizes: '512x512', type: 'image/png', purpose: 'any' },
              { src: ic, sizes: '192x192', type: 'image/png', purpose: 'maskable' },
              { src: ic512, sizes: '512x512', type: 'image/png', purpose: 'maskable' }
            ]
          };
          var blob = new Blob([JSON.stringify(mf)], { type: 'application/json' });
          var mfUrl = URL.createObjectURL(blob);
          document.querySelectorAll('link[rel="manifest"]').forEach(function(el){ el.remove(); });
          var link = document.createElement('link');
          link.rel = 'manifest'; link.href = mfUrl;
          document.head.appendChild(link);
          // Also force apple-mobile-web-app-title again after manifest
          if (titleMeta) titleMeta.setAttribute('content', sn);
        }

        // Set storeId as temporary title immediately (no "vkho")
        setTitle(storeId || h);
        // Create temporary manifest with storeId immediately (before async)
        createManifest(storeId || h, null);

        // Resolve tenant async for real name
        var resolvePromise;
        if (isSubdomain && !h.endsWith('.vkho.vn')) {
          resolvePromise = fetch(supaUrl + '/rest/v1/rpc/resolve_tenant_by_domain', {
            method: 'POST', headers: hdrs,
            body: JSON.stringify({ _domain: h })
          }).then(function(r) { return r.json(); });
        } else {
          resolvePromise = fetch(supaUrl + '/rest/v1/rpc/lookup_tenant_by_subdomain', {
            method: 'POST', headers: hdrs,
            body: JSON.stringify({ _subdomain: storeId })
          }).then(function(r) { return r.json(); }).then(function(data) {
            if (data && data.length > 0) { setTitle(data[0].name); return data[0].id; }
            return data && data.id ? (setTitle(data.name), data.id) : null;
          });
        }

        resolvePromise.then(function(tenantId) {
          if (!tenantId) return;
          return fetch(supaUrl + '/rest/v1/tenant_landing_settings?tenant_id=eq.' + tenantId + '&select=store_logo_url,store_name&is_enabled=eq.true', {
            headers: { 'apikey': anonKey, 'Authorization': 'Bearer ' + anonKey }
          }).then(function(r) { return r.json(); }).then(function(s) {
            var finalName = storeId;
            var finalIcon = null;
            if (s && s.length > 0) {
              finalName = s[0].store_name || finalName;
              finalIcon = s[0].store_logo_url || null;
              setIcon(finalIcon);
              setTitle(finalName);
            }
            createManifest(finalName, finalIcon);
          });
        }).catch(function(e) { console.warn('PWA init failed:', e); });
        }
      })();
    </script>

    <!-- Open Graph -->
    <meta property="og:title" content="Phần mềm quản lý kho chuyên nghiệp cho iPhone/phụ kiện" />
    <meta property="og:description" content="Miễn phí trải nghiệm ngay! Quản lý nhập xuất, tồn kho, IMEI, công nợ một cách dễ dàng." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="vkho.vn" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Phần mềm quản lý kho chuyên nghiệp cho iPhone/phụ kiện" />
    <meta name="twitter:description" content="Miễn phí trải nghiệm ngay! Quản lý nhập xuất, tồn kho, IMEI, công nợ một cách dễ dàng." />
    
    <!-- Prevent zoom on input focus (iOS) -->
    <style>
      /* Safe area for notch devices */
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      
      /* Prevent pull-to-refresh on mobile */
      html, body {
        overscroll-behavior-y: none;
      }
      
      /* Smooth touch scrolling */
      * {
        -webkit-tap-highlight-color: transparent;
      }
      
      /* PWA Standalone Mode - Critical CSS for iOS/Android */
      @media all and (display-mode: standalone) {
        body {
          /* Add padding for status bar in standalone mode */
          padding-top: env(safe-area-inset-top);
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <!-- Skeleton placeholder before JS loads - looks like real UI -->
      <div id="app-preloader" style="min-height:100vh;background:#f8fafc">
        <div style="height:56px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;padding:0 16px;gap:12px">
          <div style="width:32px;height:32px;border-radius:6px;background:#e2e8f0"></div>
          <div style="width:128px;height:16px;border-radius:4px;background:#e2e8f0"></div>
        </div>
        <div style="padding:16px;display:flex;flex-direction:column;gap:16px">
          <div style="width:192px;height:24px;border-radius:4px;background:#e2e8f0"></div>
          <div style="width:256px;height:16px;border-radius:4px;background:#e2e8f0"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px">
            <div style="height:96px;border-radius:8px;background:#e2e8f0"></div>
            <div style="height:96px;border-radius:8px;background:#e2e8f0"></div>
            <div style="height:96px;border-radius:8px;background:#e2e8f0"></div>
            <div style="height:96px;border-radius:8px;background:#e2e8f0"></div>
          </div>
          <div style="height:160px;border-radius:8px;background:#e2e8f0;margin-top:8px"></div>
        </div>
      </div>
      <style>
        #app-preloader div > div { animation: skpulse 1.5s ease-in-out infinite; }
        @keyframes skpulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
