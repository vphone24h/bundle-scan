<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- App Info -->
    <title>vkho.vn - Phần mềm quản lý kho miễn phí</title>
    <meta name="description" content="Phần mềm quản lý kho chuyên nghiệp cho iPhone/phụ kiện. Miễn phí trải nghiệm ngay!" />
    <meta name="author" content="vkho.vn" />
    
    <!-- PWA / Mobile App Meta Tags -->
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="vkho.vn" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- PWA Manifest - conditionally removed for store pages -->
    <link rel="manifest" href="/manifest.json" id="static-manifest" />
    
    <!-- Preconnect to critical origins for faster loading -->
    <link rel="preconnect" href="https://rodpbhesrwykmpywiiyd.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://rodpbhesrwykmpywiiyd.supabase.co" />
    <!-- Storage bucket for images -->
    <link rel="preconnect" href="https://rodpbhesrwykmpywiiyd.supabase.co/storage/v1" crossorigin />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" id="static-favicon" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" id="static-apple-icon" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Phần mềm quản lý kho chuyên nghiệp cho iPhone/phụ kiện" />
    <meta property="og:description" content="Miễn phí trải nghiệm ngay! Quản lý nhập xuất, tồn kho, IMEI, công nợ một cách dễ dàng." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="vkho.vn" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Phần mềm quản lý kho chuyên nghiệp cho iPhone/phụ kiện" />
    <meta name="twitter:description" content="Miễn phí trải nghiệm ngay! Quản lý nhập xuất, tồn kho, IMEI, công nợ một cách dễ dàng." />
    
    <!-- Critical CSS for skeleton -->
    <style>
      /* Safe area for notch devices */
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      
      /* Prevent pull-to-refresh on mobile */
      html, body {
        overscroll-behavior-y: none;
      }
      
      /* Smooth touch scrolling */
      * {
        -webkit-tap-highlight-color: transparent;
      }
      
      /* PWA Standalone Mode - Critical CSS for iOS/Android */
      @media all and (display-mode: standalone) {
        body {
          padding-top: env(safe-area-inset-top);
        }
      }
      
      /* Skeleton animation */
      #app-preloader div > div { animation: skpulse 1.5s ease-in-out infinite; }
      @keyframes skpulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    </style>
  </head>

  <body>
    <div id="root">
      <!-- Skeleton placeholder before JS loads - looks like real UI -->
      <div id="app-preloader" style="min-height:100vh;background:#f8fafc">
        <div style="height:56px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;padding:0 16px;gap:12px;background:#f1f5f9">
          <div style="width:32px;height:32px;border-radius:6px;background:#e2e8f0"></div>
          <div style="width:128px;height:16px;border-radius:4px;background:#e2e8f0"></div>
        </div>
        <div style="height:160px;background:#f1f5f9"></div>
        <div style="padding:16px;display:flex;flex-direction:column;gap:16px">
          <div style="width:192px;height:24px;border-radius:4px;background:#e2e8f0"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div style="height:96px;border-radius:8px;background:#f1f5f9"></div>
            <div style="height:96px;border-radius:8px;background:#f1f5f9"></div>
            <div style="height:96px;border-radius:8px;background:#f1f5f9"></div>
            <div style="height:96px;border-radius:8px;background:#f1f5f9"></div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- PWA store init - runs async, doesn't block render -->
    <script>
      // Pre-fetch store data so React hooks can use it immediately (no re-fetch)
      (function(){
        window.__STORE_PREFETCH__ = {};
        var p = location.pathname;
        var h = location.hostname;
        var isStore = p.indexOf('/store/') === 0;
        var isSubdomain = h !== 'bundle-scan.lovable.app' && h !== 'localhost' && h !== 'vkho.vn' && h !== 'www.vkho.vn' && !h.endsWith('.lovable.app') && !h.endsWith('.lovableproject.com');
        
        if (!isStore && !isSubdomain) return;
        
        var m = document.getElementById('static-manifest');
        if (m) m.remove();
        
        var supaUrl = 'https://rodpbhesrwykmpywiiyd.supabase.co';
        var anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvZHBiaGVzcnd5a21weXdpaXlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0MjM4MDMsImV4cCI6MjA4NDk5OTgwM30.P7Kc0pxkUdyHi8AgDBlRmPqxg0MWr2C_J_EUqORQY_s';
        var hdrs = { 'apikey': anonKey, 'Authorization': 'Bearer ' + anonKey, 'Content-Type': 'application/json' };
        var getHdrs = { 'apikey': anonKey, 'Authorization': 'Bearer ' + anonKey };
        
        var storeId = isStore ? p.split('/')[2] : (h.endsWith('.vkho.vn') ? h.replace('.vkho.vn','') : h.split('.').slice(0,-1).join('.') || h);
        var titleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
        if (titleMeta && storeId) titleMeta.setAttribute('content', storeId);
        if (storeId) document.title = storeId;
        window.__STORE_PREFETCH__.storeId = storeId;
        window.__STORE_PREFETCH__.isSubdomain = isSubdomain;

        function setIcon(url) {
          if (!url) return;
          var a = document.getElementById('static-apple-icon');
          if (a) a.href = url;
          var f = document.getElementById('static-favicon');
          if (f) f.href = url;
        }
        function setTitle(name) {
          if (!name) return;
          document.title = name;
          if (titleMeta) titleMeta.setAttribute('content', name);
        }

        // Fetch all store data in parallel once we have tenantId
        function fetchStoreData(tenantId) {
          window.__STORE_PREFETCH__.tenantId = tenantId;
          // Fetch settings, products, articles, branches ALL IN PARALLEL
          var settingsP = fetch(supaUrl + '/rest/v1/tenant_landing_settings?tenant_id=eq.' + tenantId + '&is_enabled=eq.true&select=*&limit=1', { headers: getHdrs }).then(function(r) { return r.json(); });
          var productsP = fetch(supaUrl + '/rest/v1/landing_products?tenant_id=eq.' + tenantId + '&is_active=eq.true&order=display_order&select=*', { headers: getHdrs }).then(function(r) { return r.json(); });
          var categoriesP = fetch(supaUrl + '/rest/v1/landing_product_categories?tenant_id=eq.' + tenantId + '&is_hidden=eq.false&order=display_order.asc,created_at.desc&select=*', { headers: getHdrs }).then(function(r) { return r.json(); });
          var articlesP = fetch(supaUrl + '/rest/v1/landing_articles?tenant_id=eq.' + tenantId + '&is_published=eq.true&order=display_order&select=*', { headers: getHdrs }).then(function(r) { return r.json(); });
          var artCatsP = fetch(supaUrl + '/rest/v1/landing_article_categories?tenant_id=eq.' + tenantId + '&is_visible=eq.true&order=display_order&select=*', { headers: getHdrs }).then(function(r) { return r.json(); });
          var branchesP = fetch(supaUrl + '/rest/v1/rpc/get_tenant_branches', { method: 'POST', headers: hdrs, body: JSON.stringify({ _tenant_id: tenantId }) }).then(function(r) { return r.json(); });

          // Store the promise so React can await it
          window.__STORE_PREFETCH__.dataPromise = Promise.all([settingsP, productsP, categoriesP, articlesP, artCatsP, branchesP]).then(function(results) {
            var settings = results[0] && results[0].length > 0 ? results[0][0] : null;
            if (settings) {
              setIcon(settings.store_logo_url);
              setTitle(settings.store_name);
            }
            var data = {
              settings: settings,
              products: results[1] || [],
              productCategories: results[2] || [],
              articles: results[3] || [],
              articleCategories: results[4] || [],
              branches: results[5] || [],
            };
            window.__STORE_PREFETCH__.data = data;
            return data;
          });
        }

        var resolvePromise;
        if (isSubdomain && !h.endsWith('.vkho.vn')) {
          resolvePromise = fetch(supaUrl + '/rest/v1/rpc/resolve_tenant_by_domain', {
            method: 'POST', headers: hdrs,
            body: JSON.stringify({ _domain: h })
          }).then(function(r) { return r.json(); });
        } else {
          resolvePromise = fetch(supaUrl + '/rest/v1/rpc/lookup_tenant_by_subdomain', {
            method: 'POST', headers: hdrs,
            body: JSON.stringify({ _subdomain: storeId })
          }).then(function(r) { return r.json(); }).then(function(data) {
            if (data && data.length > 0) { setTitle(data[0].name); window.__STORE_PREFETCH__.tenant = data[0]; return data[0].id; }
            if (data && data.id) { setTitle(data.name); window.__STORE_PREFETCH__.tenant = data; return data.id; }
            return null;
          });
        }

        resolvePromise.then(function(tenantId) {
          if (!tenantId) return;
          fetchStoreData(tenantId);
        }).catch(function() {});
      })();
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
