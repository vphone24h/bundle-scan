<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- App Info -->
    <title>Cùng trãi nghiệm | Tra cứu bảo hành</title>
    <meta name="description" content="Cùng trãi nghiệm và tra cứu bảo hành dành cho cửa hàng." />
    <meta name="author" content="Cùng trãi nghiệm" />
    
    <!-- PWA / Mobile App Meta Tags -->
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cùng trãi nghiệm" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- PWA Manifest - conditionally removed for store pages -->
    <link rel="manifest" href="/manifest.json" id="static-manifest" />
    
    <!-- Preconnect to critical origins for faster loading -->
    <link rel="preconnect" href="https://rodpbhesrwykmpywiiyd.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://rodpbhesrwykmpywiiyd.supabase.co" />
    <!-- Google Fonts - preload to avoid FOUT but stay non-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" onload="this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" id="static-favicon" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" id="static-apple-icon" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png" />

    <!-- Open Graph fallback (store-specific meta is served by og-meta endpoint for crawlers) -->
    <meta property="og:title" content="Cùng trãi nghiệm" />
    <meta property="og:description" content="Truy cập website để trải nghiệm ngay." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cùng trãi nghiệm" />
    <meta property="og:url" content="" />
    <!-- Ảnh 1x1 trong suốt: chặn Zalo/FB tự scrape ảnh lớn từ landing page -->
    <meta property="og:image" content="https://vkho.vn/blank.png" />
    <meta property="og:image:width" content="1" />
    <meta property="og:image:height" content="1" />

    <!-- SEO -->
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Cùng trãi nghiệm" />
    <meta name="twitter:description" content="Truy cập website để trải nghiệm ngay." />
    <meta name="twitter:image" content="https://vkho.vn/blank.png" />

    <!-- Zalo Platform Domain Verification -->
    <meta name="zalo-platform-site-verification" content="JVhaAipjQmmOx_aJvC1OBWJk_2dedIXrE3O" />

    <!-- Crawler fallback: JS-disabled clients are routed to dynamic meta endpoint -->
    <noscript>
      <meta http-equiv="refresh" content="0;url=https://rodpbhesrwykmpywiiyd.supabase.co/functions/v1/og-meta" />
    </noscript>
    
    <!-- Critical CSS for skeleton -->
    <style>
      /* Safe area for notch devices */
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      
      /* Prevent pull-to-refresh on mobile */
      html, body {
        overscroll-behavior-y: none;
      }
      
      /* Smooth touch scrolling */
      * {
        -webkit-tap-highlight-color: transparent;
      }
      
      /* PWA Standalone Mode - Critical CSS for iOS/Android */
      @media all and (display-mode: standalone) {
        body {
          padding-top: env(safe-area-inset-top);
        }
      }
      
      /* Preloader styles */
      #app-preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #f8fafc;
        transition: opacity 0.15s ease-out;
      }
      @media (prefers-color-scheme: dark) {
        #app-preloader { background: #0a0a0a; }
        #app-preloader div { border-color: #27272a !important; }
        #app-preloader div > div, #app-preloader .sk-block { background: #27272a !important; }
        #app-preloader .sk-spinner { border-color: #333 !important; border-top-color: #888 !important; }
      }
      #app-preloader.hide { opacity: 0; pointer-events: none; }
      #app-preloader .sk-block { animation: skpulse 1.2s ease-in-out infinite; }
      @keyframes skpulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
      #app-preloader .sk-spinner {
        width: 28px; height: 28px; border: 3px solid #cbd5e1;
        border-top-color: #1e3a5f; border-radius: 50%;
        animation: skspin 0.7s linear infinite; margin: 0 auto;
      }
      @keyframes skspin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <!-- Preloader OUTSIDE #root so React doesn't destroy it -->
    <div id="app-preloader">
      <div style="height:56px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;padding:0 16px;gap:12px;background:#f1f5f9">
        <div class="sk-block" style="width:32px;height:32px;border-radius:6px;background:#e2e8f0"></div>
        <div class="sk-block" style="width:128px;height:16px;border-radius:4px;background:#e2e8f0"></div>
      </div>
      <!-- Default: admin dashboard skeleton -->
      <div id="preloader-products">
        <div style="padding:16px;display:flex;flex-direction:column;gap:16px">
          <div class="sk-block" style="width:160px;height:24px;border-radius:4px;background:#cbd5e1"></div>
          <div class="sk-block" style="width:240px;height:14px;border-radius:4px;background:#e2e8f0"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px">
            <div class="sk-block" style="height:88px;border-radius:12px;background:#e2e8f0;border:1px solid #cbd5e1"></div>
            <div class="sk-block" style="height:88px;border-radius:12px;background:#e2e8f0;border:1px solid #cbd5e1"></div>
            <div class="sk-block" style="height:88px;border-radius:12px;background:#e2e8f0;border:1px solid #cbd5e1"></div>
            <div class="sk-block" style="height:88px;border-radius:12px;background:#e2e8f0;border:1px solid #cbd5e1"></div>
          </div>
          <div class="sk-spinner" style="margin-top:12px"></div>
        </div>
      </div>
      <!-- Store template skeleton (standalone/PWA) - hidden by default -->
      <div id="preloader-store" style="display:none">
        <div style="padding:0">
          <!-- Hero banner skeleton -->
          <div class="sk-block" style="height:180px;background:#e2e8f0"></div>
          <div style="padding:16px;display:flex;flex-direction:column;gap:12px">
            <div class="sk-block" style="width:140px;height:20px;border-radius:4px;background:#cbd5e1"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <div class="sk-block" style="height:140px;border-radius:12px;background:#e2e8f0"></div>
              <div class="sk-block" style="height:140px;border-radius:12px;background:#e2e8f0"></div>
              <div class="sk-block" style="height:140px;border-radius:12px;background:#e2e8f0"></div>
              <div class="sk-block" style="height:140px;border-radius:12px;background:#e2e8f0"></div>
            </div>
            <div class="sk-spinner" style="margin-top:8px"></div>
          </div>
        </div>
      </div>
    </div>
    <script>
      // Inline + sync: must run before browser paints to swap skeleton in PWA mode
      (function(){
        var sa = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        if (sa) {
          var p = document.getElementById('preloader-products');
          var s = document.getElementById('preloader-store');
          if (p) p.style.display = 'none';
          if (s) s.style.display = 'block';
        }
      })();
    </script>

    <div id="root"></div>
    
    <!-- PWA store init - deferred so preloader paints first -->
    <script defer>
      // Pre-fetch store data so React hooks can use it immediately (no re-fetch)
      (function(){
        window.__STORE_PREFETCH__ = {};
        var p = location.pathname;
        var h = location.hostname;
        var isStore = p.indexOf('/store/') === 0;
        var isSubdomain = h !== 'bundle-scan.lovable.app' && h !== 'localhost' && h !== 'vkho.vn' && h !== 'www.vkho.vn' && !h.endsWith('.lovable.app') && !h.endsWith('.lovableproject.com');
        
        if (!isStore && !isSubdomain) return;

        // If user is on /admin path, this is a company admin page - skip store prefetch
        if (p === '/admin' || p.indexOf('/admin') === 0 || p === '/platform-admin' || p.indexOf('/platform-admin') === 0) return;
        
        var supaUrl = 'https://rodpbhesrwykmpywiiyd.supabase.co';
        var anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvZHBiaGVzcnd5a21weXdpaXlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0MjM4MDMsImV4cCI6MjA4NDk5OTgwM30.P7Kc0pxkUdyHi8AgDBlRmPqxg0MWr2C_J_EUqORQY_s';
        var hdrs = { 'apikey': anonKey, 'Authorization': 'Bearer ' + anonKey, 'Content-Type': 'application/json' };
        var getHdrs = { 'apikey': anonKey, 'Authorization': 'Bearer ' + anonKey };

        // ===== INSTANT PATH: serve cached prefetch from sessionStorage (5 min TTL) =====
        // 2nd+ visits within 5 min restore branding + data instantly. Background revalidate below.
        var CACHE_KEY = '__store_prefetch_v1__:' + h;
        var CACHE_TTL = 5 * 60 * 1000;
        var hadFreshCache = false;
        try {
          var cachedRaw = sessionStorage.getItem(CACHE_KEY);
          if (cachedRaw) {
            var cached = JSON.parse(cachedRaw);
            if (cached && (Date.now() - cached.savedAt) < CACHE_TTL && cached.payload) {
              hadFreshCache = true;
              window.__STORE_PREFETCH__ = Object.assign({}, cached.payload, { fromCache: true });
              // Do NOT seed dataPromise with cached data — admin updates would not show
              // until cache TTL (5 min) expired. The fresh fetchStoreData() below will
              // assign a real dataPromise that React awaits via the fast-path.
              // Keep `data` for synchronous branding (logo/title) only; React hook is
              // patched to ignore prefetch.data when fromCache=true.
              if (cached.payload.companyCheckResolved !== undefined) {
                window.__STORE_PREFETCH__.companyCheckPromise = Promise.resolve(!!cached.payload.isCompanyDomain);
              }
              if (cached.payload.data && cached.payload.data.settings) {
                var s = cached.payload.data.settings;
                if (s.store_logo_url) {
                  var ai = document.getElementById('static-apple-icon'); if (ai) ai.href = s.store_logo_url;
                  var fi = document.getElementById('static-favicon'); if (fi) fi.href = s.store_logo_url;
                }
                if (s.store_name) document.title = s.store_name;
              }
            }
          }
        } catch(e) {}
        function persistCache() {
          try {
            var pf = window.__STORE_PREFETCH__;
            if (!pf || !pf.data) return;
            sessionStorage.setItem(CACHE_KEY, JSON.stringify({
              savedAt: Date.now(),
              payload: {
                tenantId: pf.tenantId || null,
                tenant: pf.tenant || null,
                storeId: pf.storeId || null,
                isSubdomain: pf.isSubdomain || false,
                isCompanyDomain: pf.isCompanyDomain || false,
                companyId: pf.companyId || null,
                companyName: pf.companyName || null,
                companyCheckResolved: true,
                data: pf.data,
              }
            }));
          } catch(e) {}
        }
        window.__STORE_PREFETCH_PERSIST__ = persistCache;

        // OPTIMIZATION: For non-vkho custom domains, run company lookup AND store resolution
        // in PARALLEL instead of sequentially. This eliminates one full round-trip on first paint.
        if (isSubdomain && !h.endsWith('.vkho.vn')) {
          var companyCheckPromise = fetch(supaUrl + '/rest/v1/rpc/lookup_company_by_domain', {
            method: 'POST', headers: hdrs,
            body: JSON.stringify({ _domain: h.replace(/^www\./, '') })
          }).then(function(r) { return r.json(); }).then(function(data) {
            var company = Array.isArray(data) ? data[0] : data;
            if (company && company.domain && company.domain.toLowerCase() === h.replace(/^www\./, '').toLowerCase()) {
              // This IS a company domain - flip the flag so React stops showing store landing
              window.__STORE_PREFETCH__.isCompanyDomain = true;
              window.__STORE_PREFETCH__.companyId = company.id;
              window.__STORE_PREFETCH__.companyName = company.name;
              return true;
            }
            return false;
          }).catch(function() { return false; });
          window.__STORE_PREFETCH__.companyCheckPromise = companyCheckPromise;
          // Run store resolution in parallel — if domain ends up being a company domain,
          // the prefetched store data is just discarded.
          proceedWithStoreResolution();
          return;
        }

        proceedWithStoreResolution();

        function proceedWithStoreResolution() {
        var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        
        // Preload IP immediately in standalone mode for faster warranty lookup
        if (isStandalone) {
          window.__WARRANTY_IP_PROMISE__ = Promise.race([
            fetch('https://api.ipify.org?format=json').then(function(r){return r.json()}).then(function(d){
              var ip = typeof d.ip === 'string' ? d.ip.trim() : '';
              window.__WARRANTY_CACHED_IP__ = (ip && ip !== 'unknown') ? ip : null;
              return window.__WARRANTY_CACHED_IP__;
            }),
            new Promise(function(r){setTimeout(function(){r(null)},2000)})
          ]).catch(function(){return null});
        }
        
        var storeId = isStore ? p.split('/')[2] : (h.endsWith('.vkho.vn') ? h.replace('.vkho.vn','') : h.split('.').slice(0,-1).join('.') || h);
        var titleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
        if (titleMeta && storeId) titleMeta.setAttribute('content', storeId);
        if (storeId) document.title = storeId;
        window.__STORE_PREFETCH__.storeId = storeId;
        window.__STORE_PREFETCH__.isSubdomain = isSubdomain;

    function setIcon(url) {
          if (!url) return;
          var a = document.getElementById('static-apple-icon');
          if (a) a.href = url;
          var f = document.getElementById('static-favicon');
          if (f) f.href = url;
        }
        function setTitle(name) {
          if (!name) return;
          document.title = name;
          if (titleMeta) titleMeta.setAttribute('content', name);
        }
        function setMeta(attr, key, val) {
          if (!val) return;
          var el = document.querySelector('meta[' + attr + '="' + key + '"]');
          if (el) el.setAttribute('content', val);
        }
        function updateOGMeta(settings) {
          if (!settings) return;
          var name = settings.store_name || '';
          var desc = settings.store_description || settings.meta_description || '';
          var logo = settings.store_logo_url || '';
          var canonicalUrl = location.origin + location.pathname;
          // Set canonical + og:url
          setMeta('property', 'og:url', canonicalUrl);
          var canonicalEl = document.querySelector('link[rel="canonical"]');
          if (canonicalEl) canonicalEl.setAttribute('href', canonicalUrl);
          if (name) {
            document.title = name;
            setMeta('name', 'description', desc || name);
            setMeta('name', 'author', name);
            setMeta('property', 'og:title', name);
            setMeta('property', 'og:description', desc || name);
            setMeta('property', 'og:site_name', name);
            setMeta('name', 'twitter:title', name);
            setMeta('name', 'twitter:description', desc || name);
          }
          // Cố ý KHÔNG set og:image / twitter:image — chia sẻ link chỉ hiện text
        }

        // Fetch all store data in parallel once we have tenantId
        function fetchStoreData(tenantId) {
          window.__STORE_PREFETCH__.tenantId = tenantId;
          // Fetch settings, products, articles, branches ALL IN PARALLEL
          var settingsP = fetch(supaUrl + '/rest/v1/tenant_landing_settings?tenant_id=eq.' + tenantId + '&is_enabled=eq.true&select=*&limit=1', { headers: getHdrs }).then(function(r) { return r.json(); });
          var productsP = fetch(supaUrl + '/rest/v1/landing_products?tenant_id=eq.' + tenantId + '&is_active=eq.true&order=display_order.asc,created_at.desc&select=*', { headers: getHdrs }).then(function(r) { return r.json(); });
          var categoriesP = fetch(supaUrl + '/rest/v1/landing_product_categories?tenant_id=eq.' + tenantId + '&is_hidden=eq.false&order=display_order.asc,created_at.desc&select=*', { headers: getHdrs }).then(function(r) { return r.json(); });
          var articlesP = fetch(supaUrl + '/rest/v1/landing_articles?tenant_id=eq.' + tenantId + '&is_published=eq.true&order=display_order.asc,created_at.desc&select=*', { headers: getHdrs }).then(function(r) { return r.json(); });
          var artCatsP = fetch(supaUrl + '/rest/v1/landing_article_categories?tenant_id=eq.' + tenantId + '&is_visible=eq.true&order=display_order.asc,created_at.desc&select=*', { headers: getHdrs }).then(function(r) { return r.json(); });
          var branchesP = fetch(supaUrl + '/rest/v1/rpc/get_tenant_branches', { method: 'POST', headers: hdrs, body: JSON.stringify({ _tenant_id: tenantId }) }).then(function(r) { return r.json(); });

          // Store the promise so React can await it
          window.__STORE_PREFETCH__.dataPromise = Promise.all([settingsP, productsP, categoriesP, articlesP, artCatsP, branchesP]).then(function(results) {
            var settings = results[0] && results[0].length > 0 ? results[0][0] : null;
            var products = results[1] || [];
            var articles = results[3] || [];
            if (settings) {
              setIcon(settings.store_logo_url);
              setTitle(settings.store_name);
            }
            // Detect product/article from URL path and update OG meta
            var pathname = location.pathname;
            var shortIdMatch = pathname.match(/-([a-f0-9]{8})$/);
            var shortId = shortIdMatch ? shortIdMatch[1] : null;
            var isProductPage = pathname.indexOf('/san-pham/') === 0 && shortId;
            var isArticlePage = pathname.indexOf('/tin-tuc/') === 0 && shortId;
            var storeName = (settings && settings.store_name) || '';
            var storeLogo = (settings && settings.store_logo_url) || '';
            var storeDesc = (settings && settings.store_description) || '';

            if (isProductPage && shortId) {
              var prod = null;
              for (var i = 0; i < products.length; i++) {
                if (products[i].id && products[i].id.indexOf(shortId) === 0) { prod = products[i]; break; }
              }
              if (prod) {
                var pTitle = prod.name + (storeName ? ' - ' + storeName : '');
                var pDesc = prod.description || storeDesc || '';
                var price = prod.sale_price || prod.price;
                if (price) pDesc = new Intl.NumberFormat('vi-VN').format(price) + 'đ - ' + pDesc;
                if (pDesc.length > 200) pDesc = pDesc.substring(0, 197) + '...';
                document.title = pTitle;
                setMeta('name', 'description', pDesc);
                setMeta('property', 'og:title', pTitle);
                setMeta('property', 'og:description', pDesc);
                setMeta('property', 'og:site_name', storeName);
                setMeta('property', 'og:type', 'product');
                setMeta('name', 'twitter:title', pTitle);
                setMeta('name', 'twitter:description', pDesc);
              } else {
                updateOGMeta(settings);
              }
            } else if (isArticlePage && shortId) {
              var art = null;
              for (var j = 0; j < articles.length; j++) {
                if (articles[j].id && articles[j].id.indexOf(shortId) === 0) { art = articles[j]; break; }
              }
              if (art) {
                var aTitle = art.title + (storeName ? ' - ' + storeName : '');
                var aDesc = art.summary || storeDesc || '';
                if (aDesc.length > 200) aDesc = aDesc.substring(0, 197) + '...';
                document.title = aTitle;
                setMeta('name', 'description', aDesc);
                setMeta('property', 'og:title', aTitle);
                setMeta('property', 'og:description', aDesc);
                setMeta('property', 'og:site_name', storeName);
                setMeta('property', 'og:type', 'article');
                setMeta('name', 'twitter:title', aTitle);
                setMeta('name', 'twitter:description', aDesc);
              } else {
                updateOGMeta(settings);
              }
            } else {
              updateOGMeta(settings);
            }

            var data = {
              settings: settings,
              products: products,
              productCategories: results[2] || [],
              articles: articles,
              articleCategories: results[4] || [],
              branches: results[5] || [],
            };
            window.__STORE_PREFETCH__.data = data;
            try { if (window.__STORE_PREFETCH_PERSIST__) window.__STORE_PREFETCH_PERSIST__(); } catch(e){}
            return data;
          });
        }

        var resolvePromise;
        if (isSubdomain && !h.endsWith('.vkho.vn')) {
          // Custom domain: resolve via custom_domains table.
          // Then fetch full tenant info so React hooks can hydrate instantly
          // without an extra round-trip (was the main cause of the long blank skeleton).
          resolvePromise = fetch(supaUrl + '/rest/v1/rpc/resolve_tenant_by_domain', {
            method: 'POST', headers: hdrs,
            body: JSON.stringify({ _domain: h })
          }).then(function(r) { return r.json(); }).then(function(tenantId) {
            if (!tenantId) return null;
            // Hydrate tenant info in parallel with store data fetch
            fetch(supaUrl + '/rest/v1/rpc/lookup_tenant_by_id', {
              method: 'POST', headers: hdrs,
              body: JSON.stringify({ _tenant_id: tenantId })
            }).then(function(r) { return r.json(); }).then(function(data) {
              var tenant = Array.isArray(data) ? data[0] : data;
              if (tenant) {
                setTitle(tenant.name);
                window.__STORE_PREFETCH__.tenant = tenant;
                window.__STORE_PREFETCH__.tenantId = tenantId;
                try { if (window.__STORE_PREFETCH_PERSIST__) window.__STORE_PREFETCH_PERSIST__(); } catch(e){}
              }
            }).catch(function(){});
            return tenantId;
          });
        } else {
          resolvePromise = fetch(supaUrl + '/rest/v1/rpc/lookup_tenant_by_subdomain', {
            method: 'POST', headers: hdrs,
            body: JSON.stringify({ _subdomain: storeId })
          }).then(function(r) { return r.json(); }).then(function(data) {
            if (data && data.length > 0) { setTitle(data[0].name); window.__STORE_PREFETCH__.tenant = data[0]; return data[0].id; }
            if (data && data.id) { setTitle(data.name); window.__STORE_PREFETCH__.tenant = data; return data.id; }
            return null;
          });
        }

        resolvePromise.then(function(tenantId) {
          if (!tenantId) return;
          fetchStoreData(tenantId);
        }).catch(function() {});
        } // end proceedWithStoreResolution
      })();
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
