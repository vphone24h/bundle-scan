server {
    listen 3000;
    server_name bundle.ricplace.com;

    root /usr/share/nginx/html;
    index index.html;

    # Detect social media crawlers and proxy to og-meta edge function
    # so that Zalo / Facebook / Twitter / Telegram see store-specific OG tags
    # instead of the static fallback in index.html.
    set $is_bot 0;
    if ($http_user_agent ~* "(facebookexternalhit|Facebot|Twitterbot|LinkedInBot|Slackbot|TelegramBot|WhatsApp|Discordbot|Pinterest|SkypeUriPreview|zalo|Zalo|vkShare|redditbot|Applebot|Googlebot|bingbot|YandexBot|DuckDuckBot|Baiduspider|Embedly|Iframely|SemrushBot|AhrefsBot|outbrain|quora link preview|nuzzel|bitlybot|tumblr|GoogleOther)")
    {
        set $is_bot 1;
    }

    location / {
        if ($is_bot = 1) {
            return 302 https://rodpbhesrwykmpywiiyd.supabase.co/functions/v1/og-meta?url=$scheme://$host$request_uri;
        }
        try_files $uri $uri/ /index.html;
    }
}
